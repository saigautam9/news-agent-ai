name: Deep Signal — Breaking-News Monitor

# A lightweight scan every 2 hours. One grounded Gemini call checks for breaking
# news; it only sends a Telegram alert if something CRITICAL is happening,
# otherwise it stays silent. Also runnable on demand from the Actions tab.

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours (UTC)
  workflow_dispatch:

# Shares the data/ lock with the scheduled-briefings workflow.
concurrency:
  group: deep-signal-data
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Run monitor scan
        run: npm run monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP_URL: ${{ vars.APP_URL }}
          MAX_GEMINI_CALLS: ${{ vars.MAX_GEMINI_CALLS }}
          MAX_GROQ_CALLS: ${{ vars.MAX_GROQ_CALLS }}

      - name: Commit updated data
        run: |
          git config user.name "deep-signal-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): monitor scan [skip ci]"
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            git push
          fi
